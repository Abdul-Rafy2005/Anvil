spring:
  application:
    name: anvil-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/anvil}
    username: ${DB_USERNAME:anvil}
    password: ${DB_PASSWORD:anvil}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.anvil: INFO
    org.springframework.security: WARN

jwt:
  secret: ${JWT_SECRET:YW52aWwtZGV2LXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLTIwMjU=}
  access_token_expiry_ms: ${JWT_ACCESS_EXPIRY_MS:900000}
  refresh_token_expiry_ms: ${JWT_REFRESH_EXPIRY_MS:604800000}

queue:
  relay:
    interval-ms: ${QUEUE_RELAY_INTERVAL_MS:1000}
  aging:
    threshold-ms: ${QUEUE_AGING_THRESHOLD_MS:300000}

worker:
  id: ${WORKER_ID:worker-1}
  poll-interval-ms: ${WORKER_POLL_INTERVAL_MS:2000}
  visibility-timeout-seconds: ${WORKER_VISIBILITY_TIMEOUT_S:30}
  heartbeat-interval-ms: ${WORKER_HEARTBEAT_INTERVAL_MS:10000}
  retry-backoff-seconds: ${WORKER_RETRY_BACKOFF_SECONDS:30,60,120,240}

watchdog:
  interval-ms: ${WATCHDOG_INTERVAL_MS:15000}
  heartbeat-timeout-ms: ${WATCHDOG_HEARTBEAT_TIMEOUT_MS:30000}

scheduler:
  retry-interval-ms: ${SCHEDULER_RETRY_INTERVAL_MS:5000}
